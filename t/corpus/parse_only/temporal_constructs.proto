// ABOUTME: real-world proto3 constructs from the Temporal API graph that the
// first parser pass missed — enum value options, enum reserved, empty statements
// after oneof, map field options, and gRPC-style nested/list aggregate options.
syntax = "proto3";
package corpus.temporal;
import "google/protobuf/any.proto";

enum Stage {
  STAGE_UNSPECIFIED = 0;
  STAGE_OLD = 1 [deprecated = true];
  reserved 2;
  reserved "STAGE_REMOVED";
}

message Command {
  oneof sequencing_id {
    int64 event_id = 3;
    int64 command_index = 4;
  };
  google.protobuf.Any body = 5;
  map<string, int32> attributes = 6 [deprecated = true];
}

service Ops {
  rpc Do (Command) returns (Command) {
    option (google.api.http) = {
      post: "/v1/do" body: "*"
      additional_bindings { post: "/v2/do" body: "*" }
    };
  };
  rpc List (Command) returns (Command) {
    option (openapiv2_operation) = { tags: ["Ops", "Admin"] };
  }
}
